# =============================================================
# server.conf — Configuração do servidor OpenVPN
# Autenticação mútua via certificados X.509 (sem senha compartilhada)
# =============================================================

# --- Rede ---
port 1194
proto udp
dev tun

# --- Certificados emitidos pela CA interna ---
ca   /certs/ca.cert.pem
cert /certs/server.cert.pem
key  /certs/server.key.pem

# --- Parâmetros Diffie-Hellman ---
dh /certs/dh.pem

# --- Endereçamento da VPN ---
server 10.8.0.0 255.255.255.0
ifconfig-pool-persist /var/log/openvpn/ipp.txt

# --- Rotas empurradas aos clientes ---
push "route 10.8.0.0 255.255.255.0"
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 8.8.8.8"

# --- Autenticação mútua TLS (sem senha compartilhada) ---
# tls-auth garante que apenas partes com a chave TLS possam
# sequer iniciar o handshake, mitigando ataques DoS.
tls-auth /certs/ta.key 0
key-direction 0

# --- Criptografia ---
cipher AES-256-GCM
auth SHA256
tls-version-min 1.2

# --- Comportamento do servidor ---
keepalive 10 120
persist-key
persist-tun
user nobody
group nobody

# --- Logs ---
status  /var/log/openvpn/openvpn-status.log
log     /var/log/openvpn/openvpn.log
verb 3
