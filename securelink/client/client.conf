# =============================================================
# client.conf — Configuração base do cliente OpenVPN
# Autenticação mútua via certificados X.509 (sem senha compartilhada)
# =============================================================

# --- Modo cliente ---
client
dev tun
proto udp

# --- Endereço do servidor VPN ---
# Substituído em tempo de execução via variável de ambiente SERVER_HOST
remote ${SERVER_HOST} 1194

# --- Certificados emitidos pela CA interna ---
ca   /certs/ca.cert.pem
cert /certs/client.cert.pem
key  /certs/client.key.pem

# --- Autenticação mútua TLS ---
tls-auth /certs/ta.key 1
key-direction 1

# --- Criptografia (deve espelhar o servidor) ---
cipher AES-256-GCM
auth SHA256
tls-version-min 1.2

# --- Comportamento ---
resolv-retry infinite
nobind
persist-key
persist-tun

# --- Verificação do certificado do servidor ---
# Garante que o cliente só aceita o servidor legítimo (evita MITM)
remote-cert-tls server
verify-x509-name "server.securelink.internal" name

# --- Logs ---
verb 3
